<!DOCTYPE html>
<html>
<head>
    <title>My IEP Assistant</title>
    <style>
        body { font-family: sans-serif; padding: 40px; text-align: center; background-color: #f4f7f6; }
        .card { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); display: inline-block; width: 100%; max-width: 500px; }
        button { padding: 12px 24px; cursor: pointer; background-color: #4285F4; color: white; border: none; border-radius: 5px; font-weight: bold; }
        .case-card { background: white; padding: 15px; margin-bottom: 10px; border-radius: 8px; border-left: 5px solid #28a745; text-align: left; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .shortcut-btn { padding: 8px 12px; font-size: 12px; color: white; border: none; border-radius: 4px; cursor: pointer; margin-right: 5px; margin-bottom: 5px; }
        #ai-response { margin-top: 15px; font-size: 0.9em; background: #f0f4ff; padding: 15px; border-radius: 8px; display: none; white-space: pre-wrap; text-align: left; border: 1px solid #d0d7de; }
    </style>
</head>
<body>
    <div class="card">
        <h1>My IEP Assistant</h1>
        <div id="login-section">
            <button id="login-btn">Log in with Google</button>
        </div>
        <div id="user-info" style="display: none;">
            <p>Welcome, <span id="user-name"></span>!</p>
            <p>School: <b>KIPP Navigate</b></p>
        </div>
    </div> 

    <div id="student-entry" style="display: none; margin-top: 30px; text-align: left; background: #eee; padding: 20px; border-radius: 8px; max-width: 500px; margin-left: auto; margin-right: auto;">
        <h3>Add Student Observation</h3>
        <input type="text" id="fname" placeholder="First Name" style="width: 45%; padding: 8px;">
        <input type="text" id="lname" placeholder="Last Name" style="width: 45%; padding: 8px;"><br><br>
        <input type="number" id="grade" placeholder="Grade" style="width: 95%; padding: 8px;"><br><br>
        
        <textarea id="notes" placeholder="Type observation..." style="width: 95%; height: 80px; padding: 8px;"></textarea>
        
        <div id="shortcuts" style="margin-top: 10px; display: flex; flex-wrap: wrap;">
            <button onclick="addShortcut('GOAL')" class="shortcut-btn" style="background-color: #673ab7;">🎯 Need Goal</button>
            <button onclick="addShortcut('ACCOM')" class="shortcut-btn" style="background-color: #ff9800;">🛠️ Need Accomm.</button>
            <button onclick="addShortcut('PL')" class="shortcut-btn" style="background-color: #009688;">📝 Need PL</button>
        </div>

        <button onclick="saveStudent()" style="background-color: #28a745; width: 100%; margin-top: 15px;">Scrub & Save to Vault</button>
        <div id="privacy-preview" style="margin-top: 10px; font-size: 0.8em; color: #666;"></div>
    </div>

    <div id="ai-section" style="display: none; margin-top: 20px; text-align: left; background: #fff; padding: 20px; border-radius: 12px; max-width: 500px; margin-left: auto; margin-right: auto; border: 2px solid #4285F4;">
        <h3 style="margin: 0 0 10px 0; color: #4285F4;">🤖 IEP AI Assistant</h3>
        <input type="text" id="ai-prompt" placeholder="Ask e.g. 'Write a PL for SuKi12 based on quiz data'" style="width: 75%; padding: 10px; border-radius: 5px; border: 1px solid #ccc;">
        <button onclick="askAI()" style="width: 20%; padding: 10px;">Ask</button>
        <div id="ai-response"></div>
    </div>

    <div id="dashboard" style="display: none; margin-top: 40px; max-width: 600px; margin-left: auto; margin-right: auto;">
        <hr>
        <h3>School Observation Feed</h3>
        <div id="cases-list"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, collection, addDoc, serverTimestamp, query, orderBy, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAx0lBpJLC3xAL1FBpflewUAF1k3OieBCM",
            authDomain: "my-iep-assistant.firebaseapp.com",
            projectId: "my-iep-assistant",
            storageBucket: "my-iep-assistant.firebasestorage.app",
            messagingSenderId: "926323415415",
            appId: "1:926323415415:web:f8e248e5a5e9a603532972",
            measurementId: "G-XTT3GG60CZ"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const provider = new GoogleAuthProvider();

        document.getElementById('login-btn').onclick = () => { signInWithPopup(auth, provider); };

        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById('login-section').style.display = 'none';
                ["user-info", "student-entry", "ai-section", "dashboard"].forEach(id => document.getElementById(id).style.display = 'block');
                document.getElementById('user-name').innerText = user.displayName;
                loadDashboard();
            }
        });

        window.addShortcut = (type) => { document.getElementById('notes').value += ` [${type} REQUESTED] `; };

        const loadDashboard = () => {
            const q = query(collection(db, "studentCases"), orderBy("timestamp", "desc"));
            onSnapshot(q, (snapshot) => {
                let html = "";
                snapshot.forEach(doc => {
                    const data = doc.data();
                    html += `<div class="case-card"><b>ID: ${data.studentId}</b><small style="float:right;">${data.teacher}</small><p>${data.notes}</p></div>`;
                });
                document.getElementById('cases-list').innerHTML = html || "<p>Vault is empty.</p>";
            });
        };

        window.saveStudent = () => {
            let f = document.getElementById('fname').value, l = document.getElementById('lname').value, g = document.getElementById('grade').value, n = document.getElementById('notes').value;
            if(!f || !l || !g) return alert("Fill student info");
            let key = f.substring(0,2) + l.substring(0,2) + g;
            let clean = n.replace(/\b\d{7}\b/g, "[ID REDACTED]").replace(/(dob|born|birth|birthday)\s*:?\s*\d{1,2}[\/-]\d{1,2}[\/-]\d{2,4}/gi, "[DOB REDACTED]");
            addDoc(collection(db, "studentCases"), { studentId: key, notes: clean, teacher: auth.currentUser.displayName, school: "KIPP Navigate", timestamp: serverTimestamp() })
            .then(() => { 
                document.getElementById('fname').value = "";
                document.getElementById('lname').value = "";
                document.getElementById('notes').value = ""; 
                document.getElementById('privacy-preview').innerText = "Saved!"; 
            });
        };

        // THE AI BRAIN
        window.askAI = async () => {
            const prompt = document.getElementById('ai-prompt').value;
            const resBox = document.getElementById('ai-response');
            if(!prompt) return;
            
            resBox.style.display = 'block'; 
            resBox.innerText = "🤖 Thinking...";

            try {
                const apiKey = "AIzaSyDL3b0X2ZWoolhU4g1wLNu4GcevpN2xqMg"; 
                const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`;
                
                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        contents: [{ 
                            parts: [{ text: `You are an IEP Assistant for KIPP Navigate. Use strengths-based, professional language. Request: ${prompt}` }] 
                        }] 
                    })
                });

                const data = await response.json();
                
                if (data.error) {
                    resBox.innerText = "❌ Google AI Error: " + data.error.message;
                } else if (data.candidates && data.candidates[0].content.parts[0].text) {
                    resBox.innerText = data.candidates[0].content.parts[0].text;
                } else {
                    resBox.innerText = "❌ AI responded but the format was unexpected.";
                }

            } catch (e) { 
                resBox.innerText = "❌ Network Error: Could not reach AI. Check your internet or API key."; 
            }
        };
    </script>
</body>
</html>
